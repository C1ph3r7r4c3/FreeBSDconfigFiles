#
#  This file is read when going to multi-user and its contents piped thru
#  ``sysctl'' to adjust kernel values.  ``man 5 sysctl.conf'' for details.
#

# Uncomment this to prevent users from seeing information about processes that
# are being run under another UID.
#security.bsd.see_other_uids=0

###############################################
# FreeBSD 15 - Hardened sysctl.conf (Host)
###############################################

########## Kernel Exploit Hardening ##########

# ASLR
kern.elf64.aslr.enable=1
kern.elf64.aslr.pie_enable=1

# W^X Enforcement
security.bsd.allow_wx=0

# Kernel pointer & process info protection
security.bsd.see_other_uids=0
security.bsd.see_other_gids=0
security.bsd.unprivileged_proc_debug=0
security.bsd.unprivileged_read_msgbuf=0

# Randomize PIDs
kern.randompid=1


########## Network Stack Hardening ##########

# ICMP redirect protection
net.inet.icmp.drop_redirect=1
net.inet.icmp.log_redirect=0

# TCP/UDP blackhole (drop unsolicited packets silently)
net.inet.tcp.blackhole=2
net.inet.udp.blackhole=1

# SYN flood protection
net.inet.tcp.syncookies=1
net.inet.tcp.drop_synfin=1

# Anti-spoofing
net.inet.ip.check_interface=1
net.inet.ip.rfc6864=1


########## IPv6 Hardening ##########

net.inet6.ip6.redirect=0
net.inet6.ip6.accept_rtadv=0
net.inet6.ip6.use_tempaddr=1
net.inet6.ip6.prefer_tempaddr=1
net.inet6.ip6.forwarding=0


########## ARP Hardening ##########

net.link.ether.inet.log_arp_wrong_iface=0
net.link.ether.inet.log_arp_movements=0


########## Filesystem Hardening ##########

# No user mounts
vfs.usermount=0

# ZFS ashift (SSD optimal)
vfs.zfs.vdev.min_auto_ashift=12


########## Kernel Module Control ##########

# Optional: disable module loading (very strict)
#kern.module_loading=0

###############################################
# FreeBSD 15 - ZFS Hardening
###############################################

# SSD/NVMe sector alignment (4K sectors)
vfs.zfs.vdev.min_auto_ashift=12

# Stronger metadata protection
vfs.zfs.dmu_object_alloc_chunk_shift=7

# Prevent ZFS from panicking on I/O errors
vfs.zfs.zio.use_uma=0

# Disable ZFS debug (better performance)
vfs.zfs.debug=0

# Optional: ARC tuning (uncomment if du wirklich limitieren willst)
#vfs.zfs.arc_max=8589934592     # 8GB ARC
#vfs.zfs.arc_min=2147483648     # 2GB ARC

# Optional: disable prefetch on low-RAM systems (<16GB)
#vfs.zfs.prefetch_disable=1

# Optional: prevent ZFS from auto-loading modules
#vfs.zfs.module_loading=0

