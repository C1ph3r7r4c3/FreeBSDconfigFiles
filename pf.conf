# /etc/pf.conf - FreeBSD 15 host firewall
# -----------------------------------------------

# Macros
ext_if  = "em0"
lan_net = "192.168.178.0/24"

# Tables
table <bruteforce> persist
table <bogons> persist
table <ssh_blacklist> persist

# Options
set skip on lo0
set block-policy drop
set loginterface $ext_if
set optimization normal

# Normalization
scrub in all

# Default deny all
block in all
block out all

# Antispoof
antispoof quick for $ext_if

# Block bogons
block in quick from <bogons>
block in quick from <ssh_blacklist>

# Block known brute-force sources
block in quick from <bruteforce>

# Stateful outbound
pass out keep state

# SSH with rate limiting and brute-force overload
pass in on $ext_if proto tcp to ($ext_if) port 22 \
    flags S/SA synproxy state ( \
    max-src-conn 5, max-src-conn-rate 3/30, \
    overload <bruteforce> flush global)

# Allow ICMP echo + unreach + timex
pass in on $ext_if inet proto icmp icmp-type { echoreq, unreach, timex } keep state

# Portscan protection
block in quick proto tcp from any flags FUP/FUP

